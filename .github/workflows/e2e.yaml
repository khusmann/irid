# Browser end-to-end tests (chromote + headless Chrome), kept out of the main
# R-CMD-check matrix: that job leaves IRID_E2E unset so the e2e cases skip there,
# while this dedicated job opts in and installs a browser. See
# tests/testthat/helper-e2e.R and TESTING.md (End-to-end tests).
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: e2e.yaml

permissions: read-all

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      IRID_E2E: "1"            # opt the suite in (the only trigger; not CI=)
      E2E_TIMEOUT_SCALE: "3"   # absorb a cold runner: 3x every wait budget
      E2E_ARTIFACTS: ${{ github.workspace }}/e2e-artifacts  # failure screenshots
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Suggests (chromote, callr, plotly, bslib, ...) install by default;
          # devtools is only needed to drive the run.
          extra-packages: any::devtools

      - uses: browser-actions/setup-chrome@v1

      # Fail loudly instead of green-skipping if the browser is missing — with
      # IRID_E2E=1 set, a missing Chrome is a workflow bug, not an environment we
      # quietly tolerate.
      - name: Assert a browser is available
        run: Rscript -e 'if (is.null(chromote::find_chrome())) stop("no Chrome for e2e")'

      # Runs every test-*-e2e.R (filter matches the file-name convention) and
      # nothing else; stop_on_failure makes a test failure fail the job.
      - name: Run e2e suite
        run: Rscript -e 'devtools::test(filter = "e2e", stop_on_failure = TRUE)'

      # On failure, e2e_fail() drops a screenshot per timeout into E2E_ARTIFACTS.
      # Upload them so an intermittent CI failure is diagnosable without a re-run.
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: e2e-artifacts/
          if-no-files-found: ignore
