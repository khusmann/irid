# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Install system dependencies for shinylive
        run: sudo apt-get install -y libarchive-dev

      # TODO: CRAN shinylive still bundles WebR with R 4.4, but build-rwasm
      # defaults to R 4.5. Once CRAN shinylive is updated to R 4.5, switch
      # this to install.packages("shinylive") and remove the r-universe repo.
      - name: Install shinylive
        run: |
          install.packages("shinylive",
            repos = c("https://posit-dev.r-universe.dev", "https://cloud.r-project.org") # TODO: remove r-universe once CRAN shinylive supports R 4.5
          )
          stopifnot(requireNamespace("shinylive", quietly = TRUE))
        shell: Rscript {0}

      # TODO: Restore `uses: r-wasm/actions/build-rwasm@v2` once the upstream
      # pkgcache `res_one_row_df` bug is fixed. `rwasm::add_pkg()` goes through
      # `pkgdepends::resolve()`, which currently blows up on every package.
      # Workaround: build a source tarball ourselves and call rwasm's internal
      # `wasm_build()` directly — same path r-universe takes for its wasm
      # builds, bypassing pkgdepends entirely.
      # See https://github.com/khusmann/irid/issues/6
      - name: Build irid Wasm binary
        run: |
          docker run --rm -i \
            -v "$(pwd):/github/workspace" \
            --workdir /github/workspace \
            -e GITHUB_PAT \
            ghcr.io/r-wasm/webr:main \
            Rscript - <<'EOF'
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          install.packages(c("pak", "pkgbuild"))
          pak::pak("r-wasm/rwasm")

          tarball <- pkgbuild::build(".", dest_path = tempdir(), vignettes = FALSE)

          r_short <- gsub("\\.[^.]+$", "", as.character(getRversion()))
          contrib_bin <- file.path("_rwasm", "bin", "emscripten", "contrib", r_short)
          dir.create(contrib_bin, recursive = TRUE, showWarnings = FALSE)
          rwasm:::wasm_build("irid", tarball, contrib_bin, compress = FALSE)
          EOF

      - name: Export shinylive apps
        run: |
          inject_local_wasm <- function(destdir, rwasm_repo, pkg) {
            # The Wasm build runs inside webr's docker container (currently R 4.5)
            # while the host job may be on a different R version, so don't derive
            # `r_short` from host `getRversion()`; instead pick up whichever R
            # subdir rwasm actually wrote.
            contrib_root <- file.path(rwasm_repo, "bin", "emscripten", "contrib")
            contrib <- list.files(contrib_root, full.names = TRUE)[[1]]
            tgz <- list.files(contrib, pattern = paste0("^", pkg, "_.*\\.tgz$"), full.names = TRUE)[[1]]
            tgz_name <- basename(tgz)

            pkg_dir <- file.path(destdir, "shinylive", "webr", "packages", pkg)
            dir.create(pkg_dir, recursive = TRUE, showWarnings = FALSE)
            file.copy(tgz, file.path(pkg_dir, tgz_name))

            meta_file <- file.path(destdir, "shinylive", "webr", "packages", "metadata.rds")
            metadata <- if (file.exists(meta_file)) readRDS(meta_file) else list()
            metadata[[pkg]] <- list(
              name = pkg,
              version = as.character(packageVersion(pkg)),
              ref = paste0(pkg, "@", packageVersion(pkg)),
              type = "library",
              cached = TRUE,
              assets = list(list(filename = tgz_name, url = "")),
              path = paste0("packages/", pkg, "/", tgz_name)
            )
            saveRDS(metadata, meta_file)
          }

          # Auto-discover examples from examples/*.R. The filename stem
          # (with underscores) is the R script; the slug (with hyphens)
          # becomes the URL path under docs/apps/.
          example_files <- list.files("examples", pattern = "\\.R$", full.names = TRUE)
          for (app_dir in example_files) {
            stem <- tools::file_path_sans_ext(basename(app_dir))
            slug <- gsub("_", "-", stem)
            dest_dir <- file.path("docs", "apps", slug)

            tmp_dir <- file.path(tempdir(), slug)
            dir.create(tmp_dir)
            file.copy(app_dir, file.path(tmp_dir, "app.R"))

            shinylive::export(appdir = tmp_dir, destdir = dest_dir)
            inject_local_wasm(dest_dir, "_rwasm", "irid")
          }
        shell: Rscript {0}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub pages
        id: deployment
        uses: actions/deploy-pages@v4
